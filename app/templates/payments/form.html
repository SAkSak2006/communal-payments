{% extends "base.html" %}

{% block title %}Записать оплату{% endblock %}
{% block breadcrumb %}Платежи / Новая оплата{% endblock %}

{% block content %}
<div class="mb-4">
    <h2 class="mb-1">Записать оплату</h2>
    <p class="text-muted mb-0" style="font-size:.875rem;">Регистрация платежа от жителя</p>
</div>

<div class="card card-dashboard">
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="resident_id" class="form-label">Житель *</label>
                    <select class="form-select" id="resident_id" name="resident_id" required
                            onchange="updateDebt()">
                        <option value="">-- Выберите жителя --</option>
                        {% for r in residents %}
                        <option value="{{ r.id }}" data-debt="{{ r.debt }}">
                            {{ r.full_name }} ({{ r.personal_account }})
                            {% if r.debt > 0 %} — долг {{ "{:,.2f}".format(r.debt).replace(",", " ") }} руб.{% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="amount" class="form-label">Сумма (руб.) *</label>
                    <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                </div>
                <div class="col-md-3">
                    <label for="payment_date" class="form-label">Дата оплаты *</label>
                    <input type="date" class="form-control" id="payment_date" name="payment_date" required>
                </div>
                <div class="col-md-12" id="debt-info" style="display: none;">
                    <div class="alert alert-warning mb-0">
                        <i class="bi bi-info-circle"></i>
                        Задолженность жителя: <strong id="debt-amount">0.00</strong> руб.
                        <button type="button" class="btn btn-sm btn-outline-warning ms-2"
                                onclick="document.getElementById('amount').value = document.getElementById('debt-amount').dataset.raw">
                            Вписать сумму долга
                        </button>
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="period_id" class="form-label">Период *</label>
                    <select class="form-select" id="period_id" name="period_id" required>
                        {% for p in periods %}
                        <option value="{{ p.id }}">{{ "%02d"|format(p.month) }}.{{ p.year }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="payment_method" class="form-label">Способ оплаты</label>
                    <select class="form-select" id="payment_method" name="payment_method">
                        <option value="cash">Наличные</option>
                        <option value="card">Карта</option>
                        <option value="bank_transfer">Банковский перевод</option>
                        <option value="online">Онлайн</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="receipt_number" class="form-label">Номер квитанции</label>
                    <input type="text" class="form-control" id="receipt_number" name="receipt_number">
                </div>
                <div class="col-12">
                    <label for="notes" class="form-label">Примечание</label>
                    <input type="text" class="form-control" id="notes" name="notes">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Записать
                </button>
                <a href="/admin/payments" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function updateDebt() {
    const select = document.getElementById('resident_id');
    const option = select.options[select.selectedIndex];
    const debtInfo = document.getElementById('debt-info');
    const debtAmount = document.getElementById('debt-amount');

    if (option && option.dataset.debt && parseFloat(option.dataset.debt) > 0) {
        const raw = parseFloat(option.dataset.debt);
        debtAmount.textContent = raw.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        debtAmount.dataset.raw = raw.toFixed(2);
        debtInfo.style.display = 'block';
    } else {
        debtInfo.style.display = 'none';
    }
}
</script>
{% endblock %}
