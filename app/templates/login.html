<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ЖКУ Платформа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
            background: #f7f9fb;
            overflow: hidden;
        }

        /* subtle decorative blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: rgba(0,88,190,.06);
            top: -150px; left: -150px;
        }
        body::after {
            width: 400px; height: 400px;
            background: rgba(33,112,228,.04);
            bottom: -120px; right: -120px;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border-radius: 20px;
            padding: 44px 40px;
            width: 420px;
            box-shadow: 0 12px 40px rgba(25,28,30,.08), 0 2px 8px rgba(25,28,30,.04);
            animation: cardAppear .6s ease forwards;
            opacity: 0;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .login-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #0058be, #2170e4);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            color: white;
            box-shadow: 0 8px 24px rgba(0,88,190,.2);
        }

        .login-title {
            text-align: center;
            color: #191c1e;
            font-family: 'Manrope', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            text-align: center;
            color: #727785;
            font-size: .875rem;
            margin-bottom: 32px;
        }

        .form-floating { margin-bottom: 16px; }

        .form-floating .form-control {
            background: #e0e3e5;
            border: 2px solid transparent;
            border-radius: 12px;
            color: #191c1e;
            height: 56px;
            padding: 16px;
            font-size: .9375rem;
        }

        .form-floating .form-control:focus {
            background: #e0e3e5;
            border-color: #0058be;
            box-shadow: 0 0 0 3px rgba(0,88,190,.1);
            color: #191c1e;
        }

        .form-floating label { color: #727785; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0058be, #2170e4);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: .9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s ease;
            box-shadow: 0 4px 16px rgba(0,88,190,.2);
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,88,190,.3);
            background: linear-gradient(135deg, #004a9e, #0058be);
        }

        .btn-login:active { transform: scale(.98); }

        .alert-danger {
            background: #ffdad6;
            color: #93000a;
            border: none;
            border-radius: 12px;
            font-size: .875rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">
            <i class="bi bi-house-gear"></i>
        </div>
        <div class="login-title">ЖКУ Платформа</div>
        <div class="login-subtitle">Панель управления коммунальными услугами</div>

        {% if error %}
        <div class="alert alert-danger mb-3">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="form-floating">
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Имя пользователя" required autofocus>
                <label for="username"><i class="bi bi-person"></i> Имя пользователя</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Пароль" required>
                <label for="password"><i class="bi bi-lock"></i> Пароль</label>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
        </form>
    </div>
</body>
</html>
