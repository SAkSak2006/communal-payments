services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: communal_payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  postgres_data:
